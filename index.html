<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Banana Auto-Play</title>
    <style>
        body {
            background-color: #111;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        p { font-size: 1.2em; opacity: 0.6; }
    </style>
</head>
<body>

    <p>O som deve começar automaticamente...</p>

    <audio id="meuAudio" loop>
        <source src="banana.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('meuAudio');

        // Função para tentar dar o play
        const playAudio = () => {
            audio.play().catch(err => {
                console.log("Aguardando interação para tocar...");
            });
        };

        // Tenta tocar assim que o script carregar
        playAudio();

        // Se o navegador bloquear, ele toca no primeiro clique do usuário na tela
        window.addEventListener('click', () => {
            playAudio();
        }, { once: true }); // O '{ once: true }' faz o evento rodar só uma vez
    </script>

</body>
</html>
