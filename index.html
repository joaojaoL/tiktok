<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Banana Instantâneo</title>
    <style>
        body { background: #000; margin: 0; overflow: hidden; }
    </style>
</head>
<body>

    <audio id="audio" autoplay loop>
        <source src="banana.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('audio');
        
        // Tenta forçar o play a cada 100ms até que o navegador permita
        const forcePlay = setInterval(() => {
            audio.play().then(() => {
                // Se conseguir tocar, limpa o intervalo
                clearInterval(forcePlay);
                console.log("Tocando!");
            }).catch(err => {
                console.log("Navegador bloqueando... tentando novamente.");
            });
        }, 100);

        // Se o autoplay for bloqueado de qualquer forma, 
        // qualquer movimento do mouse ou tecla vai disparar o som
        window.onclick = () => audio.play();
        window.onmousemove = () => audio.play();
        window.onkeydown = () => audio.play();
    </script>

</body>
</html>
